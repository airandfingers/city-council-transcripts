services:
  postgres:
    image: postgres:16
    container_name: ccc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ccc
      POSTGRES_PASSWORD: ccc
      POSTGRES_DB: ccc_dev
    ports:
      - "5432:5432"
    volumes:
      - ccc_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ccc -d ccc_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ccc_postgres_data:
